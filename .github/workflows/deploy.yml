name: Deploy

on:
  push:
    branches: [main, develop]

jobs:
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Render
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}"
